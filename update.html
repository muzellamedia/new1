<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KGSMA Gold Rate Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f2f4f7;
padding:25px;
}

.container{
max-width:750px;
margin:auto;
}

.card{
background:#fff;
border-radius:12px;
padding:25px;
box-shadow:0 3px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

.row{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
gap:20px;

}

.row label{

font-weight:bold;
width:180px;

}

.row input{

flex:1;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;

}

.readonly{

background:#ececec;

}

.buttons{

display:flex;
justify-content:center;
gap:10px;
margin-top:25px;

}

button{

padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;

}

#editBtn{

background:#1976D2;
color:white;

}

#updateBtn{

background:#4CAF50;
color:white;
display:none;

}

#cancelBtn{

background:#f44336;
color:white;
display:none;

}

.preview{

margin-top:30px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,.15);

}

.preview h3{

margin-bottom:20px;

}

.preview p{

font-size:18px;
margin-bottom:12px;

}

.loading{

display:none;
text-align:center;
font-size:18px;
margin-top:15px;
color:#1976D2;

}

.success{

display:none;
text-align:center;
font-size:17px;
margin-top:15px;
color:green;

}

.error{

display:none;
text-align:center;
font-size:17px;
margin-top:15px;
color:red;

}

@media(max-width:600px){

.row{

flex-direction:column;
align-items:flex-start;

}

.row label{

width:100%;

}

.row input{

width:100%;

}

.buttons{

flex-wrap:wrap;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>KGSMA Gold Rate Admin</h2>

<div class="row">
<label>22K 1 Pavan</label>
<input type="number" id="gold22_1p" disabled>
</div>

<div class="row">
<label>22K 1 Gram</label>
<input type="number" id="gold22_1g" disabled>
</div>

<div class="row">
<label>18K 1 Gram</label>
<input type="number" id="gold18_1g" disabled>
</div>

<div class="row">
<label>Silver 1 Gram</label>
<input type="number" id="silver_1g" disabled>
</div>

<div class="row">
<label>KGSMA</label>
<input type="number" id="kgsma" disabled>
</div>

<div class="row">
<label>Date</label>
<input id="date" class="readonly" readonly>
</div>

<div class="row">
<label>Time</label>
<input id="time" class="readonly" readonly>
</div>

<div class="row">
<label>Difference</label>
<input id="diff" class="readonly" readonly>
</div>

<div class="buttons">

<button id="editBtn">
Edit
</button>

<button id="updateBtn">
Update
</button>

<button id="cancelBtn">
Cancel
</button>

</div>

<div class="loading" id="loading">

Updating...

</div>

<div class="success" id="success">

Updated Successfully

</div>

<div class="error" id="error">

Update Failed

</div>

</div>

<div class="preview">

<h3>Preview</h3>

<hr><br>

<p>
📅 Date :
<span id="pDate"></span>
</p>

<p>
🕒 Time :
<span id="pTime"></span>
</p>

<p>
22K 1 Pavan :
₹<span id="p22p"></span>
</p>

<p>
22K 1 Gram :
₹<span id="p22g"></span>
</p>
<p>
18K 1 Gram :
₹<span id="p18g"></span>
</p>

<p>
Silver 1 Gram :
₹<span id="pSilver"></span>
</p>

<p>
KGSMA :
₹<span id="pKgsma"></span>
</p>

<p>
Difference :
<span id="pDiff"></span>
</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBxnjf4XDfnr4kj6mb-bR_wHW_3ZT0e9BU",

authDomain:"gold-5735f.firebaseapp.com",

projectId:"gold-5735f",

storageBucket:"gold-5735f.firebasestorage.app",

messagingSenderId:"5295731508",

appId:"1:5295731508:web:07d5430da5ebaaf6886b61"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const ref=doc(db,"rates","kgsma");

let oldData={};

async function loadData(){

loading.style.display="block";

try{

const snap=await getDoc(ref);

if(!snap.exists()){

alert("Document not found");

return;

}

oldData=snap.data();

gold22_1p.value=oldData.gold22_1p || 0;

gold22_1g.value=oldData.gold22_1g || 0;

gold18_1g.value=oldData.gold18_1g || 0;

silver_1g.value=oldData.silver_1g || 0;

kgsma.value=oldData.kgsma || 0;

date.value=oldData.date || "";

time.value=oldData.time || "";

diff.value=oldData.diff || "";

preview();

}
catch(e){

console.log(e);

alert("Loading Failed");

}

loading.style.display="none";

}

loadData();

function preview(){

pDate.textContent=date.value;

pTime.textContent=time.value;

p22p.textContent=gold22_1p.value;

p22g.textContent=gold22_1g.value;

p18g.textContent=gold18_1g.value;

pSilver.textContent=silver_1g.value;

pKgsma.textContent=kgsma.value;

pDiff.textContent=diff.value;

}

const editable=[

gold22_1p,

gold22_1g,

gold18_1g,

silver_1g,

kgsma

];

editable.forEach(box=>{

box.addEventListener("input",preview);

});

// =======================================
// EDIT BUTTON
// =======================================

editBtn.onclick = () => {

editable.forEach(box => {

box.disabled = false;

});

editBtn.style.display = "none";
updateBtn.style.display = "inline-block";
cancelBtn.style.display = "inline-block";

success.style.display = "none";
error.style.display = "none";

};

// =======================================
// CANCEL BUTTON
// =======================================

cancelBtn.onclick = () => {

editable.forEach(box => {

box.disabled = true;

});

gold22_1p.value = oldData.gold22_1p;
gold22_1g.value = oldData.gold22_1g;
gold18_1g.value = oldData.gold18_1g;
silver_1g.value = oldData.silver_1g;
kgsma.value = oldData.kgsma;

preview();

editBtn.style.display = "inline-block";
updateBtn.style.display = "none";
cancelBtn.style.display = "none";

};

// =======================================
// DATE
// =======================================

function todayDate(){

const d = new Date();

const day = String(d.getDate()).padStart(2,"0");

const month = String(d.getMonth()+1).padStart(2,"0");

const year = d.getFullYear();

return `${day}-${month}-${year}`;

}

// =======================================
// TIME
// =======================================

function currentTime(){

return new Date().toLocaleTimeString("en-IN",{

hour:"2-digit",

minute:"2-digit",

hour12:true

});

}

// =======================================
// LIVE PREVIEW
// =======================================

editable.forEach(box=>{

box.addEventListener("input",()=>{

p22p.innerHTML = gold22_1p.value;

p22g.innerHTML = gold22_1g.value;

p18g.innerHTML = gold18_1g.value;

pSilver.innerHTML = silver_1g.value;

pKgsma.innerHTML = kgsma.value;

});

});

// =======================================
// DIFFERENCE CALCULATION
// =======================================

function calculateDiff(){

const newRate = Number(gold22_1p.value);

const oldRate = Number(oldData.gold22_1p);

let difference = newRate - oldRate;

let count = oldData.updateCount || 0;

let sign = "";

if(todayDate() !== oldData.date){

count = 0;

}

const nextCount = count + 1;

if(difference > 0){

sign = (nextCount == 1) ? "+" : "++";

}

else if(difference < 0){

sign = (nextCount == 1) ? "-" : "--";

}

else{

sign = "";

}

return sign + Math.abs(difference);

}
// =======================================
// UPDATE BUTTON
// =======================================

updateBtn.onclick = async () => {

loading.style.display = "block";
success.style.display = "none";
error.style.display = "none";

try{

const today = todayDate();

let count = oldData.updateCount || 0;

// പുതിയ ദിവസം ആണെങ്കിൽ reset
if(today !== oldData.date){

count = 0;

}

const nextCount = count + 1;

const newDiff = calculateDiff();

const newDate = todayDate();

const newTime = currentTime();

await updateDoc(ref,{

gold22_1p:Number(gold22_1p.value),

gold22_1g:Number(gold22_1g.value),

gold18_1g:Number(gold18_1g.value),

silver_1g:Number(silver_1g.value),

kgsma:Number(kgsma.value),

date:newDate,

time:newTime,

diff:newDiff,

updateCount:nextCount

});

// വീണ്ടും ലോഡ് ചെയ്യുക

await loadData();

editable.forEach(box=>{

box.disabled=true;

});

editBtn.style.display="inline-block";
updateBtn.style.display="none";
cancelBtn.style.display="none";

success.style.display="block";

setTimeout(()=>{

success.style.display="none";

},3000);

}
catch(err){

console.error(err);

error.style.display="block";

setTimeout(()=>{

error.style.display="none";

},3000);

}

loading.style.display="none";

};

// =======================================
// PREVIEW REFRESH
// =======================================

setInterval(()=>{

pDate.innerHTML=date.value;

pTime.innerHTML=time.value;

pDiff.innerHTML=diff.value;

},1000);

</script>

</body>

</html>
