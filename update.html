<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  color:#fff;
}

.wrap{
  max-width:780px;
.page{
  width:min(900px, 100%);
  padding:14px;
}

h1{
  margin:8px 0 18px;
  font-size:24px;
}

h2{
  margin:24px 0 12px;
  font-size:19px;
}

.panel{
  margin-bottom:16px;
}

textarea{
  width:100%;
  min-height:190px;
  padding:12px;
  border:1px solid #555;
  border-radius:6px;
  background:#222;
  color:#fff;
  font-size:15px;
  line-height:1.45;
  resize:vertical;
  outline:none;
}

.btn{
  min-height:38px;
  padding:0 16px;
  border:0;
  border-radius:6px;
  background:#0b63e5;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.btn.secondary{
  background:#2d2d2d;
  border:1px solid #555;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

h2{
  margin:8px 0 22px;
  font-size:20px;
.status{
  margin:14px 0;
  font-weight:bold;
}

h3{
  margin:18px 0 12px;
  font-size:18px;
.success{
  color:#35c46b;
}

.error{
  color:#ff5f5f;
}

.current{
  margin-bottom:18px;
.preview{
  padding:12px;
  border:1px solid #333;
  border-radius:6px;
  background:#181818;
  line-height:1.7;
}

.row{
.message-preview{
  margin-bottom:14px;
  padding-bottom:12px;
  border-bottom:1px solid #333;
  white-space:pre-wrap;
  line-height:1.45;
}

.copy-row,
.rate-row{
  display:grid;
  grid-template-columns:1fr 90px;
  gap:8px;
  align-items:center;
  margin-bottom:10px;
}

.copy-value{
  min-height:38px;
  padding:9px 12px;
  border:1px solid #444;
  border-radius:6px;
  background:#222;
  color:#fff;
}

.copy-label{
  color:#b8c0cc;
}

input{
  width:100%;
  height:38px;
  min-height:38px;
  padding:0 12px;
  box-sizing:border-box;
  border:1px solid #555;
  border-radius:5px;
  border-radius:6px;
