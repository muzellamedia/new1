<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Rate Admin</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#eee;max-width:900px;margin:auto;padding:20px}
textarea,input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #555;background:#222;color:#fff;box-sizing:border-box}
.row{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center}
button{padding:10px 15px;border:none;border-radius:6px;background:#0b5ed7;color:#fff;cursor:pointer}
.card{background:#1b1b1b;padding:15px;border-radius:10px;margin:15px 0}
h2{margin-top:0}
.copybtn{padding:6px}
pre{white-space:pre-wrap}
</style>
</head>
<body>

<h2>Gold Rate Update</h2>

<div class="card">
<label>WhatsApp Message</label>
<textarea id="msg" rows="10" placeholder="Paste WhatsApp message here"></textarea>
<button onclick="preview()">Preview</button>
</div>

<div class="card">
<h3>Preview</h3>
<div id="previewArea">No Preview</div>
</div>


<h3>New Rate</h3>

<div class="row">
<input id="new22" placeholder="22K 1gm">
<button onclick="pasteClipboard('new22')">Paste</button>
</div>

<div class="row">
<input id="new22p" placeholder="22K 8gm">
<button onclick="pasteClipboard('new22p')">Paste</button>
</div>

<div class="row">
<input id="new18" placeholder="18K 1gm">
<button onclick="pasteClipboard('new18')">Paste</button>
</div>

<div class="row">
<input id="newsilver" placeholder="Silver">
<button onclick="pasteClipboard('newsilver')">Paste</button>
</div>

<button onclick="calculate()">Calculate</button>

<h3 id="result">Diff :</h3>

<button onclick="alert('Firebase update code goes here')">Update Firebase</button>

</div>

444

<script>

function copyValue(v){
navigator.clipboard.writeText(v.toString());
alert("Copied : "+v);
}

function preview(){

let t=document.getElementById("msg").value;

let html=t
.replace(/1gm\s*[-–]\s*₹?(\d+)/g,(m,n)=>`1gm - ₹${n} <button class='copybtn' onclick='copyValue("${n}")'>Copy</button>`)
.replace(/8gm\s*[-–]\s*₹?(\d+)/g,(m,n)=>`8gm - ₹${n} <button class='copybtn' onclick='copyValue("${n}")'>Copy</button>`);

document.getElementById("previewArea").innerHTML="<pre>"+html+"</pre>";

}

async function pasteClipboard(id){
let txt=await navigator.clipboard.readText();
txt=txt.replace(/\D/g,"");
document.getElementById(id).value=txt;
}

function calculate(){

let oldRate=parseInt(document.getElementById("old22").value);
let newRate=parseInt(document.getElementById("new22").value);

if(isNaN(newRate)){alert("Enter 22K Rate");return;}

let diff=newRate-oldRate;

let sign="";

const oldDate="2026-07-01";
let today=new Date().toISOString().slice(0,10);

if(diff>0){

if(today==oldDate) sign="++";
else sign="+";

}

else if(diff<0){

if(today==oldDate) sign="--";
else sign="-";

diff=Math.abs(diff);

}
else{

sign="";

}

document.getElementById("result").innerHTML="Diff : "+sign+diff;

}

</script>

<!--
Replace oldDate with Firebase date.
Load all values from Firestore on page load.
Use updateDoc() inside Update button.
-->

</body>
</html>
