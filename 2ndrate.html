<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold Rate Admin Panel</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f5f7fa;
  max-width:700px;
  margin:auto;
}

h2{
  margin-bottom:15px;
  text-align:center;
}

textarea{
  width:100%;
  height:260px;
  font-size:14px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  resize:none;
  outline:none;
  box-sizing:border-box;
}

input[type="file"]{
  margin-bottom:15px;
}

.buttons{
  margin-top:15px;
}

button{
  padding:12px 20px;
  font-size:15px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.update{
  background:#0b57d0;
  color:#fff;
}

.clear{
  background:#888;
  color:#fff;
  margin-left:10px;
}

.ocr{
  background:#0f9d58;
  color:#fff;
  margin-left:10px;
}

.preview-btn{
  background:#f4b400;
  color:#111;
  margin-left:10px;
}

.status{
  margin-top:15px;
  font-weight:bold;
}

.success{
  color:green;
}

.error{
  color:red;
}

.preview{
  margin-top:15px;
  padding:12px;
  background:#fff;
  border-radius:10px;
  border:1px solid #ddd;
  line-height:1.7;
}

.rate-board{
  margin-top:15px;
  display:grid;
  gap:12px;
}

.rate-card{
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  padding:14px;
}

.rate-label{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.rate-value{
  font-size:24px;
  font-weight:bold;
  color:#111;
}

.rate-subtext{
  margin-top:8px;
  font-size:14px;
  font-weight:bold;
}

.edit-grid{
  display:grid;
  gap:12px;
  margin-top:10px;
}

.edit-field label{
  display:block;
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.edit-field input{
  width:100%;
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
  box-sizing:border-box;
}

.update-wrap{
  margin-top:15px;
}

.up{
  color:#0f9d58;
}

.down{
  color:#d93025;
}

.same{
  color:#555;
}

img{
  width:100%;
  margin-top:15px;
  border-radius:10px;
}

@media(max-width:600px){

  button{
    width:100%;
    margin-left:0 !important;
    margin-top:10px;
  }

}

</style>
</head>

<body>

<h2>Gold Rate Admin Panel</h2>

<input type="file" id="imageInput" accept="image/*">

<img id="previewImage" style="display:none;">

<textarea
  id="data"
  placeholder="Paste gold rate message here or use image OCR..."
></textarea>

<div class="buttons">
  <button class="ocr" onclick="extractText()">OCR IMAGE</button>
  <button class="preview-btn" onclick="showPreview()">PREVIEW</button>
  <button class="clear" onclick="clearBox()">CLEAR</button>
</div>

<div class="status" id="status"></div>

<div class="rate-board">
  <div class="rate-card">
    <div class="rate-label">Current KGSMA Rate</div>
    <div class="rate-value" id="currentKgsmaRate">--</div>
  </div>

  <div class="rate-card">
    <div class="rate-label">Updated KGSMA Rate</div>
    <div class="rate-value" id="updatedKgsmaRate">--</div>
    <div class="rate-subtext same" id="pavanTrend">22കെ പവന് സ്റ്റാറ്റസ് ഇവിടെ കാണിക്കും</div>
  </div>
</div>

<div class="preview" id="currentRates">
  <b>Current KGSMA Rates</b><br><br>
  Loading...
</div>

<div class="preview" id="preview"></div>

<div class="update-wrap" id="updateWrap" style="display:none;">
  <button class="update" onclick="updateRates()">UPDATE</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxnjf4XDfnr4kj6mb-bR_wHW_3ZT0e9BU",
  authDomain: "gold-5735f.firebaseapp.com",
  projectId: "gold-5735f",
  storageBucket: "gold-5735f.firebasestorage.app",
  messagingSenderId: "5295731508",
  appId: "1:5295731508:web:07d5430da5ebaaf6886b61"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rateRef = doc(db, "rates", "kgsma");

const ui = {
  imageInput:document.getElementById("imageInput"),
  previewImage:document.getElementById("previewImage"),
  data:document.getElementById("data"),
  status:document.getElementById("status"),
  currentKgsmaRate:document.getElementById("currentKgsmaRate"),
  updatedKgsmaRate:document.getElementById("updatedKgsmaRate"),
  pavanTrend:document.getElementById("pavanTrend"),
  currentRates:document.getElementById("currentRates"),
  preview:document.getElementById("preview"),
  updateWrap:document.getElementById("updateWrap")
};

let currentSnapshot = null;
let previewSnapshot = null;

window.extractText = extractText;
window.showPreview = showPreview;
window.updateRates = updateRates;
window.clearBox = clearBox;

ui.imageInput.addEventListener("change", function(e){

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){
    ui.previewImage.src = evt.target.result;
    ui.previewImage.style.display = "block";
  };

  reader.readAsDataURL(file);
});

function setStatus(message, type){

  ui.status.className =
    type ? "status " + type : "status";

  ui.status.innerText = message;
}

function formatRate(value){

  if(typeof value !== "number" || Number.isNaN(value)){
    return "--";
  }

  return new Intl.NumberFormat("en-IN").format(value);
}

function parseNumber(value){

  let raw = String(value ?? "").trim();

  if(!raw){
    return null;
  }

  raw = raw.replace(/[^\d,.\-+]/g, "");

  if(raw.includes(".") && !raw.includes(",")){
    const parts = raw.split(".");

    if(
      parts.length > 1 &&
      parts.slice(1).every(function(part){
        return /^\d{3}$/.test(part);
      })
    ){
      raw = parts.join("");
    }
  }

  const numeric =
    Number(raw.replace(/[,.](?=\d{3}\b)/g, "").replace(/,/g, ""));

  return Number.isNaN(numeric) ? null : numeric;
}

function parseDiffValue(value){

  const raw = String(value ?? "").trim();

  if(!raw || raw === "0"){
    return 0;
  }

  const match = raw.match(/^(\+\+|\+|--|-)(\d+(?:\.\d+)?)$/);

  if(!match){
    return 0;
  }

  const amount = Number(match[2]);

  if(Number.isNaN(amount)){
    return 0;
  }

  return match[1].includes("-") ? -amount : amount;
}

function extractRatesFromText(text){

  const normalized = text.replace(/\r/g, "");
  const lines =
    normalized
      .split("\n")
      .map(function(line){
        return line.trim();
      })
      .filter(Boolean);

  const find = function(patterns){

    for(const pattern of patterns){

      const match = normalized.match(pattern);

      if(match){
        const numeric = parseNumber(match[1]);

        if(numeric !== null){
          return numeric;
        }
      }
    }

    return null;
  };

  const ocrRates = {
    "22": { oneGram:null, onePavan:null },
    "18": { oneGram:null, onePavan:null },
    "14": { oneGram:null, onePavan:null },
    "9": { oneGram:null, onePavan:null }
  };

  let pendingGram = null;
  let currentKarat = null;
  let lastStandaloneGram = null;

  const assignGram = function(karat, value){
    if(ocrRates[karat] && ocrRates[karat].oneGram === null){
      ocrRates[karat].oneGram = value;
    }
  };

  const assignPavan = function(karat, value){
    if(ocrRates[karat] && ocrRates[karat].onePavan === null){
      ocrRates[karat].onePavan = value;
    }
  };

  for(const line of lines){

    const gramLine =
      line.match(/(?:^|[\s(])(?:1\s*[gqc]|[i1l]c)\b[^\d]{0,8}([\d,.\s]+)(?!.*\/)/i);

    if(gramLine){
      const gramValue = parseNumber(gramLine[1]);

      if(gramValue !== null){
        lastStandaloneGram = gramValue;
        pendingGram = gramValue;
        continue;
      }
    }

    const karatLine =
      line.match(/\b(22|18|14|9)\s*k\b/i);

    if(karatLine){

      currentKarat = karatLine[1];

      if(pendingGram !== null){
        assignGram(currentKarat, pendingGram);
        pendingGram = null;
      }

      const numbers =
        (line.match(/[\d,.]+/g) || [])
          .map(parseNumber)
          .filter(function(value){
            return value !== null;
          });

      for(const value of numbers){
        if(value >= 30000){
          assignPavan(currentKarat, value);
          break;
        }
      }

      continue;
    }

    if(currentKarat){
      const pavanLine =
        line.match(/(?:8\s*g(?:m)?|1\s*pavan|[s5]\b)[^\d]{0,8}([\d,.]+)/i);

      if(pavanLine){
        const pavanValue = parseNumber(pavanLine[1]);

        if(pavanValue !== null){
          assignPavan(currentKarat, pavanValue);
      continue;
    }

    if(/silver/i.test(line) && lastStandaloneGram !== null){
      break;
    }
  }
    }
  }

  const extractBlockRates = function(blockPatterns){

    let active = false;
    let oneGram = null;
    let onePavan = null;

    for(const line of lines){

      if(blockPatterns.some(function(pattern){
        return pattern.test(line);
      })){
        active = true;
        continue;
      }

      if(active){

        if(oneGram === null){
          const gramMatch =
            line.match(/1\s*g(?:m)?[^\d]{0,10}[\u20B9Rs.\- ]*([\d,]+(?:\.\d+)?)/i);

          if(gramMatch){
            oneGram = parseNumber(gramMatch[1]);
            continue;
          }
        }

        if(onePavan === null){
          const pavanMatch =
            line.match(/(?:8\s*g(?:m)?|1\s*pavan)[^\d]{0,10}[\u20B9Rs.\- ]*([\d,]+(?:\.\d+)?)/i);

          if(pavanMatch){
            onePavan = parseNumber(pavanMatch[1]);
          }
        }

        if(oneGram !== null && onePavan !== null){
          break;
        }
      }
    }

    return {
      oneGram:oneGram,
      onePavan:onePavan
    };
  };

  const block22 = extractBlockRates([
    /22\s*k/i,
    /916/i,
    /hallmark/i
  ]);

  const block18 = extractBlockRates([
    /18\s*k/i,
    /9\s*k/i,
    /750/i
  ]);

  const silverRate =
    /silver/i.test(normalized) && lastStandaloneGram !== null
      ? lastStandaloneGram
      : find([
          /silver[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
          /silver_1g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i
        ]);

  return {
    gold22_1g:ocrRates["22"].oneGram ?? block22.oneGram ?? find([
      /22\s*k[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /gold22_1g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /22\s*carat[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i
    ]),
    gold22_1p:ocrRates["22"].onePavan ?? block22.onePavan ?? find([
      /22\s*k[^\n]{0,25}?pavan[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /gold22_1p[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /22\s*carat[^\n]{0,25}?pavan[^\d]{0,10}([\d,]+(?:\.\d+)?)/i
    ]),
    gold18_1g:ocrRates["18"].oneGram ?? block18.oneGram ?? find([
      /18\s*k[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /9\s*k[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /gold18_1g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i,
      /18\s*carat[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i
    ]),
    silver_1g:silverRate,
    kgsma:ocrRates["22"].oneGram ?? block22.oneGram ?? find([
      /kgsma[^\d]{0,20}([\d,]+(?:\.\d+)?)/i,
      /kg\s*sma[^\d]{0,20}([\d,]+(?:\.\d+)?)/i,
      /22\s*k[^\n]{0,25}?1\s*g[^\d]{0,10}([\d,]+(?:\.\d+)?)/i
    ])
  };
}

function getTrendText(previousPavan, newPavan){

  if(typeof previousPavan !== "number" || typeof newPavan !== "number"){
    return {
      text:"22കെ പവന്റെ താരതമ്യത്തിനുള്ള റേറ്റ് ലഭ്യമല്ല",
      className:"rate-subtext same"
    };
  }

  if(newPavan > previousPavan){
    return {
      text:"22കെ പവന് ഇന്ന് വില കൂടി",
      className:"rate-subtext up"
    };
  }

  if(newPavan < previousPavan){
    return {
      text:"22കെ പവന് ഇന്ന് വില കുറഞ്ഞു",
      className:"rate-subtext down"
    };
  }

  return {
    text:"22കെ പവന് ഇന്ന് മാറ്റമില്ല",
    className:"rate-subtext same"
  };
}

function getTrendFromDiff(diff){

  const numericDiff = parseDiffValue(diff);
  const absValue = Math.abs(numericDiff);

  if(numericDiff === null || numericDiff === 0){
    return {
      text:"22കെ പവന് ഇന്ന് മാറ്റമില്ല",
      className:"rate-subtext same"
    };
  }

  if(numericDiff > 0){
    return {
      text:"22കെ പവന് ഇന്ന് " + formatRate(absValue) + " രൂപ കൂടി",
      className:"rate-subtext up"
    };
  }

  return {
    text:"22കെ പവന് ഇന്ന് " + formatRate(absValue) + " രൂപ കുറഞ്ഞു",
    className:"rate-subtext down"
  };
}

function renderTrend(previousPavan, newPavan){

  const trend = getTrendText(previousPavan, newPavan);
  ui.pavanTrend.className = trend.className;
  ui.pavanTrend.innerText = trend.text;
}

function renderTrendFromDiff(diff){

  const trend = getTrendFromDiff(diff);
  ui.pavanTrend.className = trend.className;
  ui.pavanTrend.innerText = trend.text;
}

function renderCurrentSnapshot(snapshot){

  currentSnapshot = snapshot;
  ui.currentKgsmaRate.innerText = formatRate(snapshot?.kgsma);

  const trend = getTrendFromDiff(snapshot?.diff);

  ui.currentRates.innerHTML = [
    "<b>Current KGSMA Rates</b><br><br>",
    "Date: " + (snapshot?.date || "--") + "<br>",
    "Time: " + (snapshot?.time || "--") + "<br>",
    "KGSMA: ₹" + formatRate(snapshot?.kgsma) + "<br>",
    "22K 1gm: ₹" + formatRate(snapshot?.gold22_1g) + "<br>",
    "22K Pavan: ₹" + formatRate(snapshot?.gold22_1p) + "<br>",
    "18K 1gm: ₹" + formatRate(snapshot?.gold18_1g) + "<br>",
    "Silver 1gm: ₹" + formatRate(snapshot?.silver_1g) + "<br><br>",
    "<b>" + trend.text + "</b>"
  ].join("");
}

async function loadCurrentRates(){

  try{

    setStatus("Loading current rate...", "");

    const snap = await getDoc(rateRef);

    if(!snap.exists()){
      throw new Error("rates/kgsma document not found");
    }

    const data = snap.data();

    const snapshot = {
      date:data.date || "",
      time:data.time || "",
      diff:data.diff || "0",
      kgsma:parseNumber(data.kgsma ?? data.gold22_1g),
      gold22_1g:parseNumber(data.gold22_1g),
      gold22_1p:parseNumber(data.gold22_1p),
      gold18_1g:parseNumber(data.gold18_1g),
      silver_1g:parseNumber(data.silver_1g)
    };

    renderCurrentSnapshot(snapshot);
    renderTrendFromDiff(snapshot.diff);
    setStatus("Current rate loaded", "success");

  }catch(err){
    ui.currentRates.innerHTML = "Failed to load current rates";
    ui.currentKgsmaRate.innerText = "--";
    setStatus("Current rate load failed: " + err.message, "error");
  }
}

function clearBox(){

  ui.data.value = "";
  ui.preview.innerHTML = "";
  ui.updateWrap.style.display = "none";
  ui.updatedKgsmaRate.innerText = "--";
  ui.pavanTrend.className = "rate-subtext same";
  ui.pavanTrend.innerText = "22കെ പവന് സ്റ്റാറ്റസ് ഇവിടെ കാണിക്കും";
  ui.previewImage.style.display = "none";
  ui.imageInput.value = "";
  previewSnapshot = null;
  setStatus("", "");
}

async function extractText(){

  const file = ui.imageInput.files[0];

  if(!file){
    setStatus("Please select image", "error");
    return;
  }

  setStatus("Reading image...", "");

  try{

    const result =
      await Tesseract.recognize(file, "eng");

    ui.data.value = result.data.text;
    setStatus("OCR completed", "success");

  }catch(err){
    setStatus("OCR failed", "error");
  }
}

function renderPreviewEditor(snapshot){

  ui.preview.innerHTML = [
    "<b>Preview Parsed Rates</b>",
    "<div class=\"edit-grid\">",
    "<div class=\"edit-field\"><label for=\"previewKgsma\">KGSMA / 22K 1 Gram</label><input id=\"previewKgsma\" type=\"number\" inputmode=\"decimal\" value=\"" + (snapshot.kgsma ?? "") + "\"></div>",
    "<div class=\"edit-field\"><label for=\"preview22g\">22K 1 Gram</label><input id=\"preview22g\" type=\"number\" inputmode=\"decimal\" value=\"" + (snapshot.gold22_1g ?? "") + "\"></div>",
    "<div class=\"edit-field\"><label for=\"preview22p\">22K 1 Pavan</label><input id=\"preview22p\" type=\"number\" inputmode=\"decimal\" value=\"" + (snapshot.gold22_1p ?? "") + "\"></div>",
    "<div class=\"edit-field\"><label for=\"preview18g\">18K 1 Gram</label><input id=\"preview18g\" type=\"number\" inputmode=\"decimal\" value=\"" + (snapshot.gold18_1g ?? "") + "\"></div>",
    "<div class=\"edit-field\"><label for=\"previewSilver\">Silver 1 Gram</label><input id=\"previewSilver\" type=\"number\" inputmode=\"decimal\" value=\"" + (snapshot.silver_1g ?? "") + "\"></div>",
    "</div>"
  ].join("");
}

function showPreview(){

  const text = ui.data.value;

  if(!text.trim()){
    setStatus("Please paste message", "error");
    return;
  }

  const parsed = extractRatesFromText(text);

  previewSnapshot = {
    kgsma:
      parsed.kgsma !== null
        ? parsed.kgsma
        : parsed.gold22_1g !== null
          ? parsed.gold22_1g
          : currentSnapshot?.kgsma ?? null,
    gold22_1g:
      parsed.gold22_1g !== null
        ? parsed.gold22_1g
        : currentSnapshot?.gold22_1g ?? null,
    gold22_1p:
      parsed.gold22_1p !== null
        ? parsed.gold22_1p
        : currentSnapshot?.gold22_1p ?? null,
    gold18_1g:
      parsed.gold18_1g !== null
        ? parsed.gold18_1g
        : currentSnapshot?.gold18_1g ?? null,
    silver_1g:
      parsed.silver_1g !== null
        ? parsed.silver_1g
        : currentSnapshot?.silver_1g ?? null
  };

  renderPreviewEditor(previewSnapshot);
  ui.updateWrap.style.display = "block";
  setStatus("Preview generated. Edit rates if needed.", "success");
}

function getPreviewValues(){

  return {
    kgsma:parseNumber(document.getElementById("previewKgsma")?.value),
    gold22_1g:parseNumber(document.getElementById("preview22g")?.value),
    gold22_1p:parseNumber(document.getElementById("preview22p")?.value),
    gold18_1g:parseNumber(document.getElementById("preview18g")?.value),
    silver_1g:parseNumber(document.getElementById("previewSilver")?.value)
  };
}

function buildDiffString(previousSnapshot, nextPavan, todayDate){

  if(
    typeof previousSnapshot?.gold22_1p !== "number" ||
    typeof nextPavan !== "number"
  ){
    return "0";
  }

  const previousDate =
    String(previousSnapshot.date || "");

  const previousDiff =
    parseDiffValue(previousSnapshot.diff);

  let baselinePavan =
    previousSnapshot.gold22_1p;

  let repeated = false;

  if(previousDate === todayDate){
    baselinePavan =
      previousSnapshot.gold22_1p - previousDiff;
    repeated = previousDiff !== 0;
  }

  const totalDiff =
    nextPavan - baselinePavan;

  if(totalDiff === 0){
    return "0";
  }

  const absValue =
    Math.abs(totalDiff);

  if(totalDiff > 0){
    return (repeated ? "++" : "+") + absValue;
  }

  return (repeated ? "--" : "-") + absValue;
}

async function updateRates(){

  if(!previewSnapshot){
    setStatus("Preview first, then update", "error");
    return;
  }

  const previousSnapshot = currentSnapshot;
  const edited = getPreviewValues();

  if(
    edited.gold22_1g === null &&
    edited.gold22_1p === null &&
    edited.kgsma === null
  ){
    setStatus("Preview rates are empty", "error");
    return;
  }

  const now = new Date();
  const nextSnapshot = {
    date:now.toISOString().slice(0, 10),
    time:now.toLocaleTimeString("en-IN", {
      hour:"2-digit",
      minute:"2-digit",
      hour12:true
    }),
    kgsma:
      edited.kgsma !== null
        ? edited.kgsma
        : edited.gold22_1g !== null
          ? edited.gold22_1g
          : previousSnapshot?.kgsma ?? null,
    gold22_1g:
      edited.gold22_1g !== null
        ? edited.gold22_1g
        : previousSnapshot?.gold22_1g ?? null,
    gold22_1p:
      edited.gold22_1p !== null
        ? edited.gold22_1p
        : previousSnapshot?.gold22_1p ?? null,
    gold18_1g:
      edited.gold18_1g !== null
        ? edited.gold18_1g
        : previousSnapshot?.gold18_1g ?? null,
    silver_1g:
      edited.silver_1g !== null
        ? edited.silver_1g
        : previousSnapshot?.silver_1g ?? null
  };

  const diffValue =
    buildDiffString(
      previousSnapshot,
      nextSnapshot.gold22_1p,
      nextSnapshot.date
    );

  nextSnapshot.diff = diffValue;

  setStatus("Updating Firebase...", "");
  ui.preview.innerHTML = "";

  try{

    await updateDoc(rateRef, {
      date:nextSnapshot.date,
      time:nextSnapshot.time,
      diff:nextSnapshot.diff,
      kgsma:nextSnapshot.kgsma,
      gold22_1g:nextSnapshot.gold22_1g,
      gold22_1p:nextSnapshot.gold22_1p,
      gold18_1g:nextSnapshot.gold18_1g,
      silver_1g:nextSnapshot.silver_1g
    });

    ui.updatedKgsmaRate.innerText =
      formatRate(nextSnapshot.kgsma);

    renderTrendFromDiff(nextSnapshot.diff);

    ui.preview.innerHTML = [
      "<b>Updated Preview</b><br><br>",
      "Previous KGSMA Rate: ₹" + formatRate(previousSnapshot?.kgsma),
      "Updated KGSMA Rate: ₹" + formatRate(nextSnapshot.kgsma),
      "22K 1 Gram: ₹" + formatRate(nextSnapshot.gold22_1g),
      "22K Pavan Rate: ₹" + formatRate(nextSnapshot.gold22_1p),
      "18K 1 Gram: ₹" + formatRate(nextSnapshot.gold18_1g),
      "Silver 1 Gram: ₹" + formatRate(nextSnapshot.silver_1g)
    ].join("<br>");

    setStatus("Update completed successfully", "success");
    previewSnapshot = nextSnapshot;

    await loadCurrentRates();

  }catch(err){
    setStatus("Update failed: " + err.message, "error");
  }
}

loadCurrentRates();

</script>

</body>
</html>
