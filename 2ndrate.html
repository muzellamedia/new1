<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold Rate Admin Panel</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f5f7fa;
  max-width:700px;
  margin:auto;
}

h2{
  margin-bottom:15px;
  text-align:center;
}

textarea{
  width:100%;
  height:260px;
  font-size:14px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  resize:none;
  outline:none;
  box-sizing:border-box;
}

input[type="file"]{
  margin-bottom:15px;
}

.buttons{
  margin-top:15px;
}

button{
  padding:12px 20px;
  font-size:15px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.update{
  background:#0b57d0;
  color:#fff;
}

.clear{
  background:#888;
  color:#fff;
  margin-left:10px;
}

.ocr{
  background:#0f9d58;
  color:#fff;
  margin-left:10px;
}

.status{
  margin-top:15px;
  font-weight:bold;
}

.success{
  color:green;
}

.error{
  color:red;
}

.preview{
  margin-top:15px;
  padding:12px;
  background:#fff;
  border-radius:10px;
  border:1px solid #ddd;
  line-height:1.7;
}

img{
  width:100%;
  margin-top:15px;
  border-radius:10px;
}

@media(max-width:600px){

  button{
    width:100%;
    margin-left:0 !important;
    margin-top:10px;
  }

}

</style>
</head>

<body>

<h2>Gold Rate Admin Panel</h2>

<input type="file" id="imageInput" accept="image/*">

<img id="previewImage" style="display:none;">

<textarea
  id="data"
  placeholder="Paste gold rate message here or use image OCR..."
></textarea>

<div class="buttons">

  <button class="ocr" onclick="extractText()">
    OCR IMAGE
  </button>

  <button class="update" onclick="updateRates()">
    UPDATE
  </button>

  <button class="clear" onclick="clearBox()">
    CLEAR
  </button>

</div>

<div class="status" id="status"></div>
<div class="preview" id="currentRates">

<b>Current KGSMA Rates</b><br><br>

Loading...

</div>

<div class="preview" id="preview"></div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw1Kp7C2yLMlSfau_Ik97jJ9ODdCzPRbw_dMgyK3On-OZv3NzVN42jrIu_8a47JP8Bm/exec";
  const FIREBASE_URL =
"https://firestore.googleapis.com/v1/projects/gold-5735f/databases/(default)/documents/rates/kgsma";


// =====================
// IMAGE PREVIEW
// =====================

document
  .getElementById("imageInput")
  .addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(evt){

      const img =
        document.getElementById("previewImage");

      img.src = evt.target.result;

      img.style.display = "block";
    };

    reader.readAsDataURL(file);

});

// =====================
// CLEAR
// =====================

function clearBox(){

  document.getElementById("data").value = "";

  document.getElementById("status").innerHTML = "";

  document.getElementById("preview").innerHTML = "";

  document.getElementById("previewImage").style.display =
    "none";

  document.getElementById("imageInput").value = "";
}

// =====================
// OCR IMAGE
// =====================

async function extractText(){

  const file =
    document.getElementById("imageInput").files[0];

  const status =
    document.getElementById("status");

  if(!file){

    status.className = "status error";

    status.innerText =
      "❌ Please select image";

    return;
  }

  status.className = "status";

  status.innerText =
    "⏳ Reading image...";

  try{

    const result =
      await Tesseract.recognize(
        file,
        "eng"
      );

    const text = result.data.text;

    document.getElementById("data").value =
      text;

    status.className = "status success";

    status.innerText =
      "✅ OCR completed";

  }catch(err){

    status.className = "status error";

    status.innerText =
      "❌ OCR failed";
  }

}

// =====================
// UPDATE
// =====================

async function updateRates(){

  const text =
    document.getElementById("data").value;

  const status =
    document.getElementById("status");

  const preview =
    document.getElementById("preview");

  if(!text.trim()){

    status.className = "status error";

    status.innerText =
      "❌ Please paste message";

    return;
  }

  status.className = "status";

  status.innerText =
    "⏳ Processing...";

  preview.innerHTML =
  "Updated Successfully";

// 🔄 Reload latest rates
loadCurrentRates();

  try{

    await fetch(
      SCRIPT_URL,
      {
        method:"POST",
        mode:"no-cors",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          text:text
        })
      }
    );

    status.className = "status success";

    status.innerText =
      "✅ Update request sent successfully";

    preview.innerHTML =
      "Check Google Sheet / Firebase";

  }catch(err){

    status.className = "status error";

    status.innerText =
      "❌ Error: " + err.message;
  }

}
// =====================
// LOAD CURRENT RATES
// =====================

async function loadCurrentRates(){

try{

```
const res =
  await fetch(FIREBASE_URL);

const data =
  await res.json();

const f = data.fields || {};

const gold22 =
  f.gold22_1g?.integerValue || 0;

const pavan =
  f.gold22_1p?.integerValue || 0;

const gold18 =
  f.gold18_1g?.integerValue || 0;

const silver =
  f.silver_1g?.integerValue || 0;

const diff =
  f.diff?.stringValue || "0";

const time =
  f.time?.stringValue || "";

let trend = "➡️ മാറ്റമില്ല";

if(diff.startsWith("+")){

  trend =
    "🔼 22K പവന് ഇന്ന് വില കൂടി";

}else if(diff.startsWith("-")){

  trend =
    "🔽 22K പവന് ഇന്ന് വില കുറഞ്ഞു";
}

document.getElementById(
  "currentRates"
).innerHTML = `

  <b>Current KGSMA Rates</b><br><br>

  22K 1gm: ₹${gold22}<br>
  22K 8gm: ₹${pavan}<br>
  18K 1gm: ₹${gold18}<br>
  Silver: ₹${silver}<br>
  Time: ${time}<br><br>

  <b>${trend}</b>
`;
```

}catch(err){

```
document.getElementById(
  "currentRates"
).innerHTML =
  "❌ Failed to load current rates";
```

}
}

// =====================
// AUTO LOAD
// =====================

loadCurrentRates();

</script>

</body>
</html>
