<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Users</title>
<style>
:root{
  --bg:#f5f6fa;
  --card:#ffffff;
  --ink:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --brand:#0f766e;
  --danger:#b91c1c;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:var(--ink);
  background:var(--bg);
}
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:16px;
}
.top{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.controls{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
select,button,input,textarea{
  font:inherit;
}
select,input,textarea{
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  width:100%;
}
button{
  border:none;
  border-radius:8px;
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
}
.btn{background:#111827;color:#fff}
.btn-brand{background:var(--brand);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.grid{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:14px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
}
.card h3{
  margin:0;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  border-bottom:1px solid var(--line);
  padding:10px 12px;
  font-size:14px;
  text-align:left;
}
th{background:#f9fafb}
.phone-link{
  background:none;
  color:#0b57d0;
  border:none;
  padding:0;
  text-decoration:underline;
  cursor:pointer;
  font-weight:700;
}
.muted{color:var(--muted)}
.pager{
  padding:10px 12px;
  display:flex;
  gap:8px;
  justify-content:flex-end;
  border-top:1px solid var(--line);
}
.details{
  padding:12px;
}
.row{
  margin-bottom:10px;
}
.row label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
}
.chip-group{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.chip{
  display:flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:8px 10px;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
.status{
  padding:8px 0;
  color:var(--muted);
}
.asset-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}
.hidden{
  display:none !important;
}
.admin-lock{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.55);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:16px;
}
.admin-lock-box{
  width:100%;
  max-width:360px;
  background:#fff;
  border-radius:12px;
  border:1px solid var(--line);
  padding:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.admin-lock-box h3{
  margin:0 0 10px;
}
.admin-lock-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.admin-lock-msg{
  margin-top:8px;
  color:#b91c1c;
  min-height:18px;
  font-size:13px;
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="adminLock" class="admin-lock">
  <div class="admin-lock-box">
    <h3>Admin Access</h3>
    <div class="muted" style="margin-bottom:8px;">Enter admin password</div>
    <input id="adminPasswordInput" type="password" placeholder="Password">
    <div class="admin-lock-actions">
      <button id="adminUnlockBtn" class="btn-brand" style="flex:1;">Unlock</button>
    </div>
    <div id="adminLockMsg" class="admin-lock-msg"></div>
  </div>
</div>

<div id="adminApp" class="wrap hidden">
  <div class="top">
    <h2 style="margin:0;">User Admin</h2>
    <div class="controls">
      <input id="searchPhone" placeholder="Search by phone number" style="min-width:240px;">
      <button class="btn" id="searchBtn">Search</button>
      <button class="btn" id="clearSearchBtn">Clear</button>
      <label for="sortBy" class="muted">Sort</label>
      <select id="sortBy">
        <option value="new">New Users</option>
        <option value="expiry">Expiry Date</option>
      </select>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Users (20 per page)</h3>
      <table>
        <thead>
          <tr>
            <th>Phone</th>
            <th>Shop</th>
            <th>Place</th>
            <th>Plan Expiry</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="userRows"></tbody>
      </table>
      <div class="pager">
        <span id="pageInfo" class="muted" style="margin-right:auto;">Page 1</span>
        <button id="prevBtn">Prev</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>

    <div class="card">
      <h3>User Details</h3>
      <div class="details" id="detailsWrap">
        <div class="muted">Phone number click ചെയ്യുക.</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  limit,
  getDocs,
  startAfter,
  doc,
  getDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxnjf4XDfnr4kj6mb-bR_wHW_3ZT0e9BU",
  authDomain: "gold-5735f.firebaseapp.com",
  projectId: "gold-5735f",
  storageBucket: "gold-5735f.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const PAGE_SIZE = 20;
let currentPage = 0;
let pageCursors = [null];
let currentSort = "new";
let currentDocs = [];
let selectedPhone = "";
const ADMIN_SESSION_KEY = "admin_unlocked_v1";

const rowsEl = document.getElementById("userRows");
const pageInfoEl = document.getElementById("pageInfo");
const detailsWrap = document.getElementById("detailsWrap");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const sortByEl = document.getElementById("sortBy");
const refreshBtn = document.getElementById("refreshBtn");
const searchPhoneEl = document.getElementById("searchPhone");
const searchBtn = document.getElementById("searchBtn");
const clearSearchBtn = document.getElementById("clearSearchBtn");
const adminLockEl = document.getElementById("adminLock");
const adminAppEl = document.getElementById("adminApp");
const adminPasswordInputEl = document.getElementById("adminPasswordInput");
const adminUnlockBtnEl = document.getElementById("adminUnlockBtn");
const adminLockMsgEl = document.getElementById("adminLockMsg");

function formatDate(val){
  if(!val) return "--";
  try{
    if(typeof val?.toDate === "function") return val.toDate().toLocaleString();
    const d = new Date(val);
    if(Number.isNaN(d.getTime())) return String(val);
    return d.toLocaleString();
  }catch{
    return String(val);
  }
}

function setAdminLockMsg(text){
  adminLockMsgEl.textContent = text || "";
}

async function getAdminPasswordFromFirestore(){
  const snap = await getDoc(doc(db, "settings", "admin"));
  if(!snap.exists()) return "";
  const data = snap.data() || {};
  return String(data.password || "");
}

function unlockAdminUi(){
  adminLockEl.classList.add("hidden");
  adminAppEl.classList.remove("hidden");
}

async function verifyAdminPassword(){
  const entered = adminPasswordInputEl.value.trim();
  if(!entered){
    setAdminLockMsg("Enter password");
    return;
  }
  adminUnlockBtnEl.disabled = true;
  setAdminLockMsg("Checking...");
  try{
    const actual = await getAdminPasswordFromFirestore();
    if(!actual){
      setAdminLockMsg("Admin password not configured in Firestore");
      return;
    }
    if(entered !== actual){
      setAdminLockMsg("Wrong password");
      return;
    }
    sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
    setAdminLockMsg("");
    unlockAdminUi();
    await loadPage(0);
  }catch(err){
    console.error(err);
    setAdminLockMsg("Failed to verify password");
  }finally{
    adminUnlockBtnEl.disabled = false;
  }
}

function toIsoFromNow(days){
  const now = new Date();
  now.setDate(now.getDate() + days);
  return now.toISOString();
}

function listQuery(cursor){
  const usersRef = collection(db, "users");
  const orderField = currentSort === "expiry" ? "planExpiry" : "createdAt";
  const direction = currentSort === "expiry" ? "asc" : "desc";
  if(cursor){
    return query(usersRef, orderBy(orderField, direction), startAfter(cursor), limit(PAGE_SIZE));
  }
  return query(usersRef, orderBy(orderField, direction), limit(PAGE_SIZE));
}

async function loadPage(pageIndex){
  rowsEl.innerHTML = `<tr><td colspan="5" class="muted">Loading...</td></tr>`;
  const cursor = pageCursors[pageIndex] || null;
  const snap = await getDocs(listQuery(cursor));
  currentDocs = snap.docs;
  currentPage = pageIndex;
  pageInfoEl.textContent = `Page ${currentPage + 1}`;
  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = snap.docs.length < PAGE_SIZE;

  if(snap.docs.length){
    pageCursors[currentPage + 1] = snap.docs[snap.docs.length - 1];
  }

  renderRows(snap.docs);
}

function renderRows(docs){
  if(!docs.length){
    rowsEl.innerHTML = `<tr><td colspan="5" class="muted">No users found.</td></tr>`;
    return;
  }

  rowsEl.innerHTML = docs.map((d) => {
    const u = d.data();
    return `
      <tr>
        <td><button class="phone-link" data-phone="${d.id}">${d.id}</button></td>
        <td>${u.shop || "--"}</td>
        <td>${u.place || "--"}</td>
        <td>${formatDate(u.planExpiry)}</td>
        <td>${u.status || "--"}</td>
      </tr>
    `;
  }).join("");

  document.querySelectorAll(".phone-link").forEach((btn) => {
    btn.addEventListener("click", () => openDetails(btn.dataset.phone));
  });
}

function collectProductsFromForm(){
  const selected = [];
  document.querySelectorAll(".pchk").forEach((cb) => {
    if(cb.checked) selected.push(cb.value);
  });
  return selected;
}

function checkedAttr(products, value){
  return Array.isArray(products) && products.includes(value) ? "checked" : "";
}

function renderDetails(phone, u){
  const products = Array.isArray(u.products) ? u.products : [];
  detailsWrap.innerHTML = `
    <div class="row"><label>Phone</label><input id="f_phone" value="${phone}" disabled></div>
    <div class="row"><label>Shop</label><input id="f_shop" value="${u.shop || ""}"></div>
    <div class="row"><label>Place</label><input id="f_place" value="${u.place || ""}"></div>
    <div class="row"><label>District</label><input id="f_district" value="${u.district || ""}"></div>
    <div class="row"><label>State</label><input id="f_state" value="${u.state || ""}"></div>
    <div class="row"><label>Security Code</label><input id="f_code" value="${u.code || ""}"></div>

    <div class="row">
      <label>Products</label>
      <div class="chip-group">
        <label class="chip"><input class="pchk" type="checkbox" value="22K Gold" ${checkedAttr(products, "22K Gold")}>22K Gold</label>
        <label class="chip"><input class="pchk" type="checkbox" value="18K Gold" ${checkedAttr(products, "18K Gold")}>18K Gold</label>
        <label class="chip"><input class="pchk" type="checkbox" value="Silver" ${checkedAttr(products, "Silver")}>Silver</label>
      </div>
    </div>

    <div class="row"><label>Plan Expiry</label><input id="f_planExpiry" value="${u.planExpiry || ""}"></div>
    <div class="row"><label>Status</label><input id="f_status" value="${u.status || ""}"></div>
    <div class="row"><label>Logo URL</label><input id="f_logoURL" value="${u.logoURL || ""}"></div>
    <div class="row asset-row">
      <input id="f_logoFile" type="file" accept="image/*">
      <button class="btn" id="uploadLogoBtn">Change Logo</button>
    </div>
    <div class="row"><label>Footer URL</label><input id="f_footerURL" value="${u.footerURL || ""}"></div>
    <div class="row asset-row">
      <input id="f_footerFile" type="file" accept="image/*">
      <button class="btn" id="uploadFooterBtn">Change Footer</button>
    </div>

    <div class="actions">
      <button class="btn-brand" id="saveBtn">Edit / Save</button>
      <button class="btn-danger" id="deleteBtn">Delete User</button>
      <button class="btn" id="plan1Btn">Activate 1 Day</button>
      <button class="btn" id="plan365Btn">Activate 365 Day</button>
    </div>
    <div class="status" id="detailStatus"></div>
  `;

  document.getElementById("saveBtn").addEventListener("click", saveDetails);
  document.getElementById("deleteBtn").addEventListener("click", deleteUserProfile);
  document.getElementById("plan1Btn").addEventListener("click", () => activatePlan(1));
  document.getElementById("plan365Btn").addEventListener("click", () => activatePlan(365));
  document.getElementById("uploadLogoBtn").addEventListener("click", () => uploadAsset("logo"));
  document.getElementById("uploadFooterBtn").addEventListener("click", () => uploadAsset("footer"));
}

function setDetailStatus(text, danger=false){
  const el = document.getElementById("detailStatus");
  if(!el) return;
  el.style.color = danger ? "#b91c1c" : "#0f766e";
  el.textContent = text;
}

async function openDetails(phone){
  selectedPhone = phone;
  detailsWrap.innerHTML = `<div class="muted">Loading details...</div>`;
  const ref = doc(db, "users", phone);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    detailsWrap.innerHTML = `<div class="muted">User not found.</div>`;
    return;
  }
  renderDetails(phone, snap.data());
}

async function saveDetails(){
  if(!selectedPhone) return;
  const ref = doc(db, "users", selectedPhone);
  try{
    await updateDoc(ref, {
      shop: document.getElementById("f_shop").value.trim(),
      place: document.getElementById("f_place").value.trim(),
      district: document.getElementById("f_district").value.trim(),
      state: document.getElementById("f_state").value.trim(),
      code: document.getElementById("f_code").value.trim(),
      planExpiry: document.getElementById("f_planExpiry").value.trim(),
      status: document.getElementById("f_status").value.trim() || "active",
      products: collectProductsFromForm(),
      logoURL: document.getElementById("f_logoURL").value.trim(),
      footerURL: document.getElementById("f_footerURL").value.trim()
    });
    setDetailStatus("Saved successfully.");
    await loadPage(currentPage);
  }catch(err){
    console.error(err);
    setDetailStatus("Save failed: " + (err.message || "error"), true);
  }
}

async function uploadAsset(kind){
  if(!selectedPhone) return;
  const fileInput = document.getElementById(kind === "logo" ? "f_logoFile" : "f_footerFile");
  const file = fileInput?.files?.[0];
  if(!file){
    setDetailStatus(`Select ${kind} file first.`, true);
    return;
  }

  const path = `${kind}s/${selectedPhone}`;
  const field = kind === "logo" ? "logoURL" : "footerURL";
  const inputId = kind === "logo" ? "f_logoURL" : "f_footerURL";

  try{
    setDetailStatus(`Uploading ${kind}...`);
    const assetRef = ref(storage, path);
    await uploadBytes(assetRef, file);
    const url = await getDownloadURL(assetRef);
    await updateDoc(doc(db, "users", selectedPhone), { [field]: url });
    const input = document.getElementById(inputId);
    if(input) input.value = url;
    setDetailStatus(`${kind} updated successfully.`);
  }catch(err){
    console.error(err);
    setDetailStatus(`${kind} upload failed: ${err.message || "error"}`, true);
  }
}

async function searchByPhone(){
  const phone = searchPhoneEl.value.trim();
  if(!phone){
    await loadPage(0);
    return;
  }
  rowsEl.innerHTML = `<tr><td colspan="5" class="muted">Searching...</td></tr>`;
  const snap = await getDoc(doc(db, "users", phone));
  prevBtn.disabled = true;
  nextBtn.disabled = true;
  pageInfoEl.textContent = "Search Result";
  if(!snap.exists()){
    rowsEl.innerHTML = `<tr><td colspan="5" class="muted">User not found.</td></tr>`;
    return;
  }
  const u = snap.data();
  rowsEl.innerHTML = `
    <tr>
      <td><button class="phone-link" data-phone="${phone}">${phone}</button></td>
      <td>${u.shop || "--"}</td>
      <td>${u.place || "--"}</td>
      <td>${formatDate(u.planExpiry)}</td>
      <td>${u.status || "--"}</td>
    </tr>
  `;
  document.querySelector(".phone-link")?.addEventListener("click", () => openDetails(phone));
  await openDetails(phone);
}

async function activatePlan(days){
  if(!selectedPhone) return;
  const ref = doc(db, "users", selectedPhone);
  try{
    await updateDoc(ref, {
      planDays: days,
      planExpiry: toIsoFromNow(days),
      status: "active"
    });
    setDetailStatus(`Plan activated: ${days} day`);
    await openDetails(selectedPhone);
    await loadPage(currentPage);
  }catch(err){
    console.error(err);
    setDetailStatus("Plan update failed: " + (err.message || "error"), true);
  }
}

async function deleteUserProfile(){
  if(!selectedPhone) return;
  const ok = confirm(`Delete user ${selectedPhone}? This cannot be undone.`);
  if(!ok) return;
  const ref = doc(db, "users", selectedPhone);
  try{
    await deleteDoc(ref);
    selectedPhone = "";
    detailsWrap.innerHTML = `<div class="muted">User deleted.</div>`;
    await loadPage(currentPage);
  }catch(err){
    console.error(err);
    setDetailStatus("Delete failed: " + (err.message || "error"), true);
  }
}

sortByEl.addEventListener("change", async () => {
  currentSort = sortByEl.value;
  currentPage = 0;
  pageCursors = [null];
  await loadPage(0);
});

refreshBtn.addEventListener("click", async () => {
  pageCursors = [null];
  currentPage = 0;
  await loadPage(0);
});

prevBtn.addEventListener("click", async () => {
  if(currentPage === 0) return;
  await loadPage(currentPage - 1);
});

nextBtn.addEventListener("click", async () => {
  await loadPage(currentPage + 1);
});

searchBtn.addEventListener("click", () => {
  searchByPhone().catch((err) => {
    console.error(err);
    rowsEl.innerHTML = `<tr><td colspan="5" class="muted">Search failed: ${err.message || err}</td></tr>`;
  });
});

clearSearchBtn.addEventListener("click", async () => {
  searchPhoneEl.value = "";
  pageCursors = [null];
  currentPage = 0;
  await loadPage(0);
});

searchPhoneEl.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    searchByPhone().catch((err) => {
      console.error(err);
      rowsEl.innerHTML = `<tr><td colspan="5" class="muted">Search failed: ${err.message || err}</td></tr>`;
    });
  }
});

adminUnlockBtnEl.addEventListener("click", () => {
  verifyAdminPassword();
});

adminPasswordInputEl.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    verifyAdminPassword();
  }
});

if(sessionStorage.getItem(ADMIN_SESSION_KEY) === "1"){
  unlockAdminUi();
  loadPage(0).catch((err) => {
    console.error(err);
    rowsEl.innerHTML = `<tr><td colspan="5" class="muted">Failed to load users: ${err.message || err}</td></tr>`;
  });
}
</script>
</body>
</html>
