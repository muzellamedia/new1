<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Preview Tool</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ddd;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

/* LEFT */
.editor{
  width:35%;
}

textarea{
  width:100%;
  height:75vh;
  font-family:monospace;
  font-size:14px;
  padding:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

/* FILE INPUT */
input{
  width:100%;
  margin-top:10px;
}

/* RIGHT */
.preview{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* CANVAS */
canvas{
  border:2px solid #000;
  width:420px;
  height:594px;
  background:#fff; /* default white */
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="editor">
    <textarea id="codeBox"></textarea>

    <!-- UPLOAD -->
    <input type="file" id="bgUpload" accept="image/*">

    <button onclick="render()">Preview</button>
  </div>

  <!-- RIGHT -->
  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

</div>

<script>

// =====================
// CANVAS SETUP (A4)
// =====================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 2480;
canvas.height = 3508;


// =====================
// GLOBAL
// =====================
let customBg = null;


// =====================
// HELPERS
// =====================
function roundRect(ctx, x, y, w, h, r, fill, stroke){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

function formatRateValue(val){
  return Number(val).toLocaleString("en-IN");
}

// DEMO DATA
let rate22k_1g = 15000;
let rate22k_1p = 220000;


// =====================
// IMAGE UPLOAD
// =====================
document.getElementById("bgUpload").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){
    const img = new Image();
    img.src = evt.target.result;

    img.onload = function(){
      customBg = img;
      render(); // auto preview
    };
  };

  reader.readAsDataURL(file);
});


// =====================
// RENDER
// =====================
function render(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // BACKGROUND
  if(customBg){
    ctx.drawImage(customBg, 0, 0, canvas.width, canvas.height);
  }else{
    ctx.fillStyle = "#ffffff"; // default
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  const code = document.getElementById("codeBox").value;

  try{
    new Function("ctx","canvas", code)(ctx, canvas);
  }catch(e){
    alert("Code Error: " + e.message);
  }
}

</script>

</body>
</html>
