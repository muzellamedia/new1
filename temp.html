<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A4 Preview Tool</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ddd;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

/* LEFT */
.editor{
  width:35%;
}

textarea{
  width:100%;
  height:80vh;
  font-family:monospace;
  font-size:14px;
  padding:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

/* RIGHT */
.preview{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* IMPORTANT: SCALE FIX */
canvas{
  background:#0a6b2d;
  border:2px solid #000;

  width: 420px;   /* display size */
  height: 594px;  /* A4 ratio */
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="editor">
    <textarea id="codeBox"></textarea>
    <button onclick="render()">Preview</button>
  </div>

  <!-- RIGHT -->
  <div class="preview">
    <canvas id="canvas"></canvas>
  </div>

</div>

<script>

// =====================
// REAL A4 SIZE (PRINT)
// =====================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// REAL SIZE (HIGH QUALITY)
canvas.width = 2480;
canvas.height = 3508;


// =====================
// HELPERS
// =====================
function roundRect(ctx, x, y, w, h, r, fill, stroke){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

function formatRateValue(val){
  return Number(val).toLocaleString("en-IN");
}

// DEMO DATA
let rate22k_1g = 15000;
let rate22k_1p = 120000;


// =====================
// BUTTON RENDER
// =====================
function render(){

  // clear
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background
  ctx.fillStyle = "#0a6b2d";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const code = document.getElementById("codeBox").value;

  try{
    new Function("ctx","canvas", code)(ctx, canvas);
  }catch(e){
    alert("Code Error: " + e.message);
  }
}

</script>

</body>
</html>
