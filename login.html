.sample-grid{

<body>

<div class="title">
<h1>💎 Daily Gold Poster</h1>
<p>Download System</p>
</div>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="phone" placeholder="Phone Number">
  <input type="password" id="code" placeholder="Security Code">

  <button class="login-btn" onclick="login()">Login</button>
  <button class="register-btn" onclick="goRegister()">Register</button>
  <button class="forgot-btn" onclick="openWhatsApp()">
Forgot Security Code?
</button>

  <div class="error" id="error"></div>
</div>
<div class="samples">

<h3>Sample Posters</h3>

<div class="sample-grid">

<img src="https://lh3.googleusercontent.com/d/1iCZSGpFgHP5UNahRp7_9mkb018h8OqHW">

<img src="https://lh3.googleusercontent.com/d/1vXAFvzc8J-tw5FBEjGtJof4Ey5JNSrAm">

</div>
  </div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxnjf4XDfnr4kj6mb-bR_wHW_3ZT0e9BU",
  authDomain: "gold-5735f.firebaseapp.com",
  projectId: "gold-5735f",
  storageBucket: "gold-5735f.firebasestorage.app",
  messagingSenderId: "5295731508",
  appId: "1:5295731508:web:07d5430da5ebaaf6886b61"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



window.login = async function(){

const btn = document.querySelector(".login-btn");

const phone = document.getElementById("phone").value.trim();
const code = document.getElementById("code").value.trim();

if (!phone || !code) {
  document.getElementById("error").innerText = "Please fill all fields";
  return;
}

if(!/^[0-9]{10}$/.test(phone)){
  document.getElementById("error").innerText = "Enter valid phone number";
  return;
}

btn.disabled = true;
btn.innerText = "Logging...";

try{

const userRef = doc(db,"users",phone);
const userSnap = await getDoc(userRef);

if(userSnap.exists()){

  const data = userSnap.data();

  if(data.code == code){

    localStorage.setItem("userPhone", phone);
    window.location.href = "index.html";

  } else {
    document.getElementById("error").innerText = "Invalid security code";
    btn.disabled = false;
    btn.innerText = "Login";
  }

} else {

  document.getElementById("error").innerText = "User not found";
  btn.disabled = false;
  btn.innerText = "Login";

}

}
catch(err){
console.log(err);
document.getElementById("error").innerText = "Error occurred";
btn.disabled = false;
btn.innerText = "Login";
}

}
window.goRegister = function(){
  window.location.href = "register.html";
}
window.openWhatsApp = function(){

const msg = encodeURIComponent("I am forget my security code!");

window.open(
"https://wa.me/919656100346?text=" + msg,
"_blank"
);

}
</script>
