<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#8b0000,#ffcccb);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:10px;
}

.register-box{
background:white;
padding:25px;
border-radius:12px;
width:100%;
max-width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:15px;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
background:#8b0000;
color:white;
font-size:16px;
}

button:hover{
background:#600000;
}

.message{
margin-top:12px;
text-align:center;
font-weight:bold;
}

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

  .popup-box button{
background:#006400;
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}
  
.popup-box{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
max-width:300px;
width:90%;
}

.products-title{
margin:18px 0 10px;
font-size:26px;
}

.products-grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:10px;
margin-bottom:12px;
}

.product-option{
display:flex;
align-items:center;
gap:10px;
padding:12px 10px;
border:1px solid #ddd;
border-radius:12px;
background:#fafafa;
cursor:pointer;
font-size:20px;
font-weight:700;
transition:0.2s;
user-select:none;
}

.product-option:hover{
border-color:#8b0000;
}

.product-option input{
width:22px;
height:22px;
margin:0;
accent-color:#8b0000;
flex:0 0 auto;
}

.product-text{
line-height:1.2;
}

@media(max-width:480px){
.products-grid{
grid-template-columns:1fr;
}
.product-option{
font-size:22px;
padding:14px 12px;
}
}
</style>

</head>

<body>

<div class="register-box">

<h2>Register</h2>

<input type="tel" id="phone" placeholder="Phone Number">
<input type="text" id="shop" placeholder="Shop Name (CAPITAL)">
<input type="text" id="place" placeholder="Place">

<select id="district">
<option value="">Select District</option>
<option>Thiruvananthapuram</option>
<option>Kollam</option>
<option>Pathanamthitta</option>
<option>Alappuzha</option>
<option>Kottayam</option>
<option>Idukki</option>
<option>Ernakulam</option>
<option>Thrissur</option>
<option>Palakkad</option>
<option>Malappuram</option>
<option>Kozhikode</option>
<option>Wayanad</option>
<option>Kannur</option>
<option>Kasaragod</option>
<option>Outside Kerala</option>
</select>

<select id="state">
<option value="">Select State</option>
<option>Kerala</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
</select>

<h3 class="products-title">Products</h3>
<div class="products-grid">
  <label class="product-option">
    <input type="checkbox" value="22K Gold" class="product">
    <span class="product-text">22K Gold</span>
  </label>
  <label class="product-option">
    <input type="checkbox" value="18K Gold" class="product">
    <span class="product-text">18K Gold</span>
  </label>
  <label class="product-option">
    <input type="checkbox" value="Silver" class="product">
    <span class="product-text">Silver</span>
  </label>
</div>

<h3>Upload Logo</h3>
<input type="file" id="logo" accept="image/*">

<h3>Upload Footer Design</h3>
<input type="file" id="footer" accept="image/*">

<button onclick="register()" id="registerBtn">Register</button>

<div class="message" id="message"></div>

<div id="successPopup" class="popup-overlay">
<div class="popup-box">
<h3>Registration Successful</h3>
<p>Your Security Code is:</p>
<h2 id="securityCode"></h2>
<button onclick="goHome()">Go Home</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxnjf4XDfnr4kj6mb-bR_wHW_3ZT0e9BU",
  authDomain: "gold-5735f.firebaseapp.com",
  projectId: "gold-5735f",
  storageBucket: "gold-5735f.firebasestorage.app",
  messagingSenderId: "5295731508",
  appId: "1:5295731508:web:07d5430da5ebaaf6886b61"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// REGISTER FUNCTION
window.register = async function(){

const btn = document.getElementById("registerBtn");
btn.innerText="Registering...";
btn.disabled=true;

const phone = document.getElementById("phone").value.trim();
const shop = document.getElementById("shop").value.trim();
const place = document.getElementById("place").value.trim();
const district = document.getElementById("district").value;
const state = document.getElementById("state").value;

const logoFile = document.getElementById("logo").files[0];
const footerFile = document.getElementById("footer").files[0];

const productCheckboxes = document.querySelectorAll(".product");
let products = [];

productCheckboxes.forEach(cb=>{
if(cb.checked) products.push(cb.value);
});

// validation
if(!phone || !shop || !place || !district || !state || !logoFile || !footerFile){
alert("Fill all fields");
btn.disabled=false;
btn.innerText="Register";
return;
}

if(products.length===0){
alert("Select products");
btn.disabled=false;
btn.innerText="Register";
return;
}

try{

const userRef = doc(db,"users",phone);
const existing = await getDoc(userRef);

if(existing.exists()){
alert("Already registered");
btn.disabled=false;
btn.innerText="Register";
return;
}

// upload logo
const logoRef = ref(storage,"logos/"+phone);
await uploadBytes(logoRef,logoFile);
const logoURL = await getDownloadURL(logoRef);

// upload footer
const footerRef = ref(storage,"footers/"+phone);
await uploadBytes(footerRef,footerFile);
const footerURL = await getDownloadURL(footerRef);

// code generate
const code = Math.floor(1000 + Math.random()*9000);
// 🔥 UPDATED
const today = new Date();
const expiry = new Date();
expiry.setDate(today.getDate() + 1);

await setDoc(userRef,{
phone,
shop,
place,
district,
state,

products,
logoURL,
footerURL,

code,
createdAt: new Date(),

// ✅ PLAN DEFAULT 1 DAY
planDays: 1,
planExpiry: expiry.toISOString(),
status: "active"
});

localStorage.setItem("userPhone",phone);

document.getElementById("securityCode").innerText = code;
document.getElementById("successPopup").style.display = "flex";

}
catch(err){
console.log(err);
alert("Error");
}

btn.innerText="Register";
btn.disabled=false;

}


window.goHome = function(){
window.location.href="index.html";
}

function showMessage(text,color){
const msg=document.getElementById("message");
msg.innerText=text;
msg.style.color=color;
}

</script>

</body>
</html>
